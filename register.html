<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maquette Office 365 - Inscription</title>
    <link rel="stylesheet" href="css/office365-mockup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">Inscription Microsoft 365 — Maquette</div>
      <a class="btn btn-secondary" href="index.html">Accueil</a>
    </header>
    <main class="main">
      <section class="hero form-wrap">
        <h1>Créer un compte</h1>
        <p>Écran maquette d’inscription pour vos parcours d’onboarding.</p>
        <label class="label" for="fullName">Nom complet</label>
        <input class="input" id="fullName" type="text" placeholder="Nom Prénom" />
        <label class="label" for="workEmail">Adresse e-mail</label>
        <input class="input" id="workEmail" type="email" placeholder="vous@organisation.com" />
        <label class="label" for="newPwd">Mot de passe</label>
        <input class="input" id="newPwd" type="password" placeholder="Créer un mot de passe" />
        <div class="links">
          <a class="btn btn-primary" href="verification.html">Continuer</a>
          <a class="btn btn-secondary" href="login.html">J’ai déjà un compte</a>
        </div>
        <p class="helper">Vous pouvez brancher ce gabarit sur votre backend plus tard.</p>
      </section>
    </main>
  </body>
</html>
