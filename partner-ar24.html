<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maquette Partenaire Office 365</title>
    <link rel="stylesheet" href="css/office365-mockup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">Portail partenaire — Office 365 (maquette)</div>
      <a class="btn btn-secondary" href="index.html">Accueil</a>
    </header>

    <main class="main">
      <section class="hero">
        <h1>Entrée partenaire sécurisée</h1>
        <p>
          Gabarit destiné à vos parcours B2B: validation de domaine, routage des utilisateurs,
          et redirection vers les applications Microsoft 365.
        </p>
      </section>

      <section class="hero form-wrap">
        <h2>Vérifier un domaine partenaire</h2>
        <label class="label" for="domain">Domaine entreprise</label>
        <input class="input" id="domain" type="text" placeholder="ex: contoso.com" />
        <div class="links">
          <a class="btn btn-primary" href="verification.html">Vérifier</a>
          <a class="btn btn-secondary" href="maquettes.html">Voir le plan</a>
        </div>
      </section>
    </main>
  </body>
</html>
