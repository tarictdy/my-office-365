<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Authentifié - AR24</title>
    <link
      rel="stylesheet"
      href="https://app.ar24.fr/static/min/?f=css/reset.css,css/design-system.css,fonts/font-barlow.css,fonts/font-montserrat.css&1771239617"
    />
    <link
      href="https://app.ar24.fr/static/css/pages/user-login.css?v=1771239617"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      .success-wrapper {
        min-height: calc(100vh - 260px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 32px 16px;
      }

      .success-card {
        width: min(100%, 560px);
        padding: 40px 32px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.12);
        text-align: center;
      }

      .success-badge {
        width: 88px;
        height: 88px;
        margin: 0 auto 20px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: linear-gradient(145deg, #eef4ff, #dbe7ff);
        color: #0000ff;
        font-size: 2.4rem;
        font-weight: 700;
      }

      .success-title {
        margin-bottom: 12px;
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        font-weight: 700;
      }

      .success-text {
        margin: 0 0 24px;
        color: #667085;
      }
    </style>
      <link rel="stylesheet" href="css/auth-modern.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">État de connexion — Maquette</div>
      <a class="btn btn-secondary" href="index.html">Accueil</a>
    </header>
    <main class="main status">
      <div class="status-icon">✅</div>
      <h1>Connexion validée (prototype)</h1>
      <p class="helper">Utilisez cet écran pour finaliser votre parcours et les étapes post-login.</p>
      <div class="links" style="justify-content:center;">
        <a class="btn btn-primary" href="maquettes.html">Voir toutes les maquettes</a>
      </div>
    </main>
  </body>
</html>
