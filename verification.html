<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Vérification en cours - AR24</title>
    <link
      rel="stylesheet"
      href="https://app.ar24.fr/static/min/?f=css/reset.css,css/design-system.css,fonts/font-barlow.css,fonts/font-montserrat.css&1771239617"
    />
    <link
      href="https://app.ar24.fr/static/css/pages/user-login.css?v=1771239617"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      .status-wrapper {
        min-height: calc(100vh - 260px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 32px 16px;
      }

      .status-card {
        width: min(100%, 560px);
        padding: 40px 32px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.12);
        text-align: center;
      }

      .loader-title {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(3rem, 8vw, 5.5rem);
        font-weight: 700;
        letter-spacing: 0.15em;
        color: #0000ff;
        animation: ar24-color 1s ease-in-out infinite;
      }

      .status-message {
        margin: 20px 0 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(1.2rem, 2.4vw, 1.8rem);
        font-weight: 700;
        color: #101828;
      }

      .status-submessage {
        margin: 0;
        color: #667085;
        font-size: 1rem;
      }

      .progress-dots {
        display: inline-flex;
        gap: 8px;
        margin-top: 24px;
      }

      .progress-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(0, 0, 255, 0.22);
        animation: pulse 1.2s infinite ease-in-out;
      }

      .progress-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .progress-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes ar24-color {
        0% {
          color: #0000ff;
        }
        50% {
          color: #8f8f8f;
        }
        100% {
          color: #0000ff;
        }
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          transform: scale(0.85);
          opacity: 0.45;
        }
        40% {
          transform: scale(1.1);
          opacity: 1;
          background: #0000ff;
        }
      }
    </style>
      <link rel="stylesheet" href="css/auth-modern.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">Vérification Microsoft 365 — Maquette</div>
      <a class="btn btn-secondary" href="index.html">Accueil</a>
    </header>
    <main class="main status">
      <div class="status-icon">⏳</div>
      <h1>Vérification en cours...</h1>
      <p class="helper">Simulation de progression UX. Redirection automatique vers l’état succès.</p>
    </main>
  </body>
</html>
