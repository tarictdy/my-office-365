<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maquette Office 365 - Connexion</title>
    <link rel="stylesheet" href="css/office365-mockup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">Connexion Microsoft 365 — Maquette</div>
      <a class="btn btn-secondary" href="index.html">Accueil</a>
    </header>
    <main class="main">
      <section class="hero form-wrap">
        <h1>Se connecter</h1>
        <p>Prototype visuel de l’écran de connexion.</p>
        <label class="label" for="email">Adresse e-mail professionnelle</label>
        <input class="input" id="email" type="email" placeholder="prenom.nom@entreprise.com" />
        <label class="label" for="pwd">Mot de passe</label>
        <input class="input" id="pwd" type="password" placeholder="••••••••" />
        <div class="links">
          <a class="btn btn-primary" href="verification.html">Continuer</a>
          <a class="btn btn-secondary" href="register.html">Créer un compte</a>
        </div>
        <div class="notice">Note: maquette UI uniquement, aucun envoi de données.</div>
      </section>
    </main>
  </body>
</html>
